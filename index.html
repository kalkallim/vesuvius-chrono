<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">

<title>Ancient Chronology Timeline v6.0</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1e;
    color: #e8e4d8;
    font-family: 'Georgia', 'Times New Roman', serif;
    padding: 24px 12px;
    min-height: 100vh;
  }
  .chart-wrapper { width: 100%; max-width: min(1600px, calc(90vh * 1600 / 946)); margin: 0 auto; }
  svg { display: block; width: 100%; height: auto; min-width: 320px; }
  #tooltip {
    position: fixed;
    background: rgba(8,8,12,0.97);
    border: 1px solid #c8b98a;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    pointer-events: none;
    z-index: 9999;
    max-width: 320px;
    display: none;
    box-shadow: 0 4px 24px rgba(0,0,0,0.7);
    line-height: 1.7;
  }
  .tt-name  { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing:.08em; margin-bottom:3px; }
  .tt-top   { color: #7DC4A0; font-weight: bold; font-size: 13px; }
  .tt-bot   { color: #7aafd4; font-weight: bold; font-size: 13px; }
  .tt-am    { color: #c8b98a; font-weight: bold; font-size: 14px; margin-top:5px; border-top:1px solid #2a2a2a; padding-top:5px; }
  .tt-segs  { margin-top:6px; border-top:1px solid #2a2a2a; padding-top:5px; }
  .tt-seg   { font-size: 12px; margin-bottom:2px; }
  .tt-segam { font-size: 11px; color: #c8b98a; margin-bottom:4px; }
  .year-finder {
    max-width: 1600px;
    margin: 0 auto 14px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .year-finder label {
    font-size: 21px;
    color: #ffffff;
    font-style: italic;
    font-family: Georgia, serif;
  }
  #yearInput {
    width: 130px;
    background: #252530;
    border: 1px solid #444;
    border-radius: 4px;
    color: #e8e4d8;
    font-size: 21px;
    font-family: Georgia, serif;
    padding: 7px 12px;
    text-align: center;
  }
  #yearInput:focus { outline: none; border-color: #c8b98a; }
  .era-toggle { display: flex; gap: 6px; }
  .era-toggle button {
    background: #252530;
    border: 1px solid #ffffff;
    color: #ffffff;
    font-size: 21px;
    font-family: Georgia, serif;
    padding: 7px 16px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
  }
  #btnBC.active { background: #27AE60; color: #fff; border-color: #27AE60; font-weight: 700; }
  #btnAD.active { background: #27AE60; color: #fff; border-color: #27AE60; font-weight: 700; }
  .era-toggle button:not(.active):hover { background: #1e3a2a; }
  #findBtn {
    background: #27AE60;
    border: none;
    border-radius: 4px;
    color: #fff;
    font-size: 21px;
    font-family: Georgia, serif;
    font-weight: 700;
    padding: 8px 20px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  #findBtn:hover { background: #2ecc71; }

  #yearOverlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a1e;
    z-index: 99999;
    padding: 24px 20px;
    overflow-y: auto;
    flex-direction: column;
  }
  #yearOverlay.active { display: flex; }
  #overlayBack {
    background: #27AE60;
    border: none;
    border-radius: 4px;
    color: #fff;
    font-size: 15px;
    font-family: Georgia, serif;
    font-weight: 700;
    padding: 10px 20px;
    cursor: pointer;
    align-self: flex-start;
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }
  #overlayBack:hover { background: #2ecc71; }
  #overlayContent {
    font-size: 14px;
    color: #e8e4d8;
    font-family: Georgia, serif;
    line-height: 1.8;
  }
  #overlayContent .yr-axis-label { font-size: 15px; }
  #overlayContent .yr-row { font-size: 13px; }
  #yearResult {
    font-size: 12px;
    color: #e8e4d8;
    font-family: Georgia, serif;
    display: none;
    background: rgba(8,8,12,0.97);
    border: 1px solid #c8b98a;
    border-radius: 6px;
    padding: 8px 10px;
    width: fit-content;
    max-width: min(1600px, calc(90vh * 1600 / 946));
    line-height: 1.7;
    box-shadow: 0 4px 24px rgba(0,0,0,0.7);
    margin: 6px auto 6px;
  }
  .yr-double {
    display: flex;
    gap: 16px;
  }
  .yr-double > div {
    flex: 0 0 auto;
  }
  .yr-double .yr-divider {
    width: 1px;
    background: #333;
    margin: 0;
    flex: none;
  }
  .yr-axis-label { color: #c8b98a; font-weight: bold; font-size: 13px; margin-bottom: 3px; }
  .yr-top-date   { color: #7DC4A0; font-weight: bold; }
  .yr-bot-date   { color: #7aafd4; font-weight: bold; }
  .yr-rows  { margin-top: 6px; border-top: 1px solid #2a2a2a; padding-top: 5px; }
  .yr-row   { font-size: 11px; color: #888; margin-bottom: 2px; }
  .yr-row span { color: #c8b98a; }
  .yr-divider { border-top: 1px solid #333; margin: 8px 0; }
  .legend-label {
    stroke: #ffffff;
    stroke-width: 3;
    stroke-linejoin: round;
    paint-order: stroke fill;
  }
  @media print, (prefers-color-scheme: light) {
    .legend-label { stroke: #000000; }
  }
</style>

const svg       = document.getElementById('chart');
const overlay   = document.getElementById('hover-overlay');
const crosshair = document.getElementById('crosshair');
const tooltip   = document.getElementById('tooltip');

function getSVGX(evt) {
  const rect = svg.getBoundingClientRect();
  return (evt.clientX - rect.left) * (1600 / rect.width);
}

// Vaticanus AM at any x position (same as standard AM, both anchored at x=292)
function vatAM(svgX) {
  return (svgX - 292) / PX_PER_YR + 1;
}

// Convert a raw AM float to display integer, skipping 0
function amDisplay(raw) {
  const r = Math.round(raw);
  if (r === 0) return raw > 0 ? 1 : -1;
  return r;
}

// Given svgX, find the display AM for a row using offset system
function getRowAM(row, svgX) {
  const vat = vatAM(svgX);
  const offset = row.amOffset || 0;
  return amDisplay(vat + offset);
}

// Find what segment the cursor is actively inside (null if outside all)
function getActiveSeg(row, svgX) {
  for (const seg of row.segments) {
    if (svgX >= seg.x && svgX <= seg.x + seg.w) return seg;
  }
  return null;
}

overlay.addEventListener('mousemove', (evt) => {
  const svgX = getSVGX(evt);
  if (svgX < PLOT_X0 || svgX > PLOT_X0 + PLOT_W) return;

  crosshair.setAttribute('x1', svgX);
  crosshair.setAttribute('x2', svgX);
  crosshair.setAttribute('opacity', '0.7');

  const amVal   = vatAM(svgX);
  const topYr   = amVal > 3760 ? amVal - 3760 : amVal - 3761;  // no year zero
  const botYr   = 5313 - amVal;   // AM-derived: positive=BC, negative=AD

  let segHTML = '';
  for (const row of ROWS) {
    const amCursor = getRowAM(row, svgX);
    if (amCursor === null) continue;
    const activeSeg = getActiveSeg(row, svgX);
    // Color: use active segment color if inside one, else last segment before cursor
    let tc = '#888';
    let labelText = '—';
    if (activeSeg) {
      const darkBlock  = ['#1a1a1a','#555'].includes(activeSeg.color);
      const lightBlock = activeSeg.color === '#e8e4d8' || activeSeg.color === '#aaa';
      tc = darkBlock ? '#bbb' : lightBlock ? '#666' : activeSeg.color;
      labelText = activeSeg.label;
    } else {
      // Find the last segment whose x is <= svgX (extrapolating past end)
      let lastSeg = null;
      for (const seg of row.segments) { if (seg.x <= svgX) lastSeg = seg; }
      if (lastSeg) {
        const darkBlock  = ['#1a1a1a','#555'].includes(lastSeg.color);
        const lightBlock = lastSeg.color === '#e8e4d8' || lastSeg.color === '#aaa';
        tc = darkBlock ? '#bbb' : lightBlock ? '#666' : lastSeg.color;
        labelText = lastSeg.label;
      }
    }
    segHTML += `<div style="margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid #1e1e1e">` +
      `<div style="font-size:12px;font-weight:600;color:${tc}">${row.shortName} ${amCursor} AM</div>` +
      `<div style="font-size:11px;color:#666">${labelText}</div>` +
      `</div>`;
  }

  tooltip.innerHTML =
    `<div class="tt-name">Cursor position</div>` +
    `<div class="tt-top">Top Axis: ${fmtTop(topYr)}</div>` +
    `<div class="tt-bot">Bottom Axis: ${fmtBot(botYr)}</div>` +
    (segHTML ? `<div class="tt-segs">${segHTML}</div>` : '');

  const ttW = 320;
  const ttH = tooltip.scrollHeight || 200;
  const margin = 14;
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  let left = evt.clientX + margin;
  if (left + ttW > vw - 4) left = evt.clientX - ttW - margin;
  if (left < 4) left = 4;

  let top = evt.clientY - 12;
  if (top + ttH > vh - 4) top = vh - ttH - 4;
  if (top < 4) top = 4;

  tooltip.style.left    = left + 'px';
  tooltip.style.top     = top + 'px';
  tooltip.style.display = 'block';
});

overlay.addEventListener('mouseleave', () => {
  crosshair.setAttribute('opacity', '0');
  tooltip.style.display = 'none';
});

overlay.addEventListener('touchmove', (evt) => {
  evt.preventDefault();
  const t = evt.touches[0];
  overlay.dispatchEvent(new MouseEvent('mousemove', {clientX:t.clientX, clientY:t.clientY}));
}, {passive:false});

overlay.addEventListener('touchend', () => {
  crosshair.setAttribute('opacity', '0');
  tooltip.style.display = 'none';
});

// ── YEAR FINDER ──────────────────────────────────────────────────────────────
let currentEra = 'BC';
let lastX1 = null, lastX2 = null;

function setEra(era) {
  currentEra = era;
  document.getElementById('btnBC').classList.toggle('active', era === 'BC');
  document.getElementById('btnAD').classList.toggle('active', era === 'AD');
  autoFind();
}

document.getElementById('yearInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') findYear();
});

// Complementary axis date helpers (correct year-zero gap handling)
function compBot(T) {
  // T: top-axis year (positive=AD, negative=BC)
  // Returns complementary bottom year (positive=BC, negative=AD)
  if (T > 1552) return 1552 - T;
  if (T > 0)    return 1553 - T;
  return -T + 1552;
}
function compTop(B) {
  // B: bottom-axis year (positive=BC, negative=AD)
  // Returns complementary top year (positive=AD, negative=BC)
  if (B > 1552) return 1552 - B;
  if (B >= 0)   return 1553 - B;
  return 1552 - B;
}

function buildOccurrence(svgX, axisLabel, hideTop, compYear) {
  // compYear: pre-computed complementary axis year to display
  let html = `<div class="yr-axis-label">${axisLabel}</div>`;
  if (hideTop) {
    html += `<div><span class="yr-bot-date">Bottom Axis: ${fmtBot(compYear)}</span></div>`;
  } else {
    html += `<div><span class="yr-top-date">Top Axis: ${fmtTop(compYear)}</span></div>`;
  }
  html += `<div class="yr-rows">`;
  for (const row of ROWS) {
    const am = getRowAM(row, svgX);
    if (am === null) continue;
    html += `<div class="yr-row">${row.shortName}: <span>${am} AM</span></div>`;
  }
  html += `</div>`;
  return html;
}


function isMobile() {
  return window.innerWidth < 700 || ('ontouchstart' in window && window.innerWidth < 1024);
}

function closeOverlay() {
  document.getElementById('yearOverlay').classList.remove('active');
}

function autoFind() {
  const val = document.getElementById('yearInput').value;
  if (val && parseInt(val) >= 1) findYear();
}


function setBarAnn(prefix, svgX, label) {
  const lOff  = document.getElementById(prefix + '-off-line');
  const tOff  = document.getElementById(prefix + '-off-text');
  const lTer  = document.getElementById(prefix + '-ter-line');
  const tTer  = document.getElementById(prefix + '-ter-text');
  const rOff  = document.getElementById(prefix + '-off-rect');
  const rTer  = document.getElementById(prefix + '-ter-rect');
  const x = Math.round(svgX);
  const pad = 5;
  const approxW = label.length * 15.6;
  const textX = x - pad - 2;
  const anchor = 'end';
  const rectX  = x - approxW - pad * 2 - 2;

  [lOff, lTer].forEach(l => {
    l.setAttribute('x1', x); l.setAttribute('x2', x);
    l.setAttribute('opacity', '0.9');
  });
  [tOff, tTer].forEach(t => {
    t.setAttribute('x', textX);
    t.setAttribute('text-anchor', anchor);
    t.textContent = label;
    t.setAttribute('opacity', '1');
  });
  [rOff, rTer].forEach((r, i) => {
    r.setAttribute('x', rectX);
    r.setAttribute('y', i === 0 ? '125' : '611');
    r.setAttribute('width', approxW + pad * 2);
    r.setAttribute('height', '28');
    r.setAttribute('opacity', '1');
  });
}

function clearBarAnn(prefix) {
  ['off-line','off-text','ter-line','ter-text','off-rect','ter-rect'].forEach(id => {
    document.getElementById(prefix + '-' + id).setAttribute('opacity', '0');
  });
}

function findYear() {
  const val = parseInt(document.getElementById('yearInput').value);
  if (isNaN(val) || val < 1) { return; }

  const isBC = currentEra === 'BC';
  // Invert: x = (year + 4248)*PX_PER_YR + 184
  const yr_top = isBC ? -val : val;
  const yr_bot = isBC ? val : -val;   // bot axis: positive=BC, negative=AD

  // AM-based inversion: consistent with tooltip dates
  const x_top = 292 + (yr_top + 3760) * PX_PER_YR;   // vatAM = yr_top+3761, x = 292+(am-1)*ppy
  const x_bot = 292 + (5312 - yr_bot) * PX_PER_YR;   // vatAM = 5313-yr_bot

  const in_top = x_top >= PLOT_X0 && x_top <= PLOT_X0 + PLOT_W;
  const in_bot = x_bot >= PLOT_X0 && x_bot <= PLOT_X0 + PLOT_W;
  const is_double = in_top && in_bot && Math.abs(x_top - x_bot) > 2;

  const line1 = document.getElementById('finder-line-1');
  const line2 = document.getElementById('finder-line-2');
  const prev1 = document.getElementById('prev-line-1');
  const prev2 = document.getElementById('prev-line-2');

  // Save current gold positions as gray previous lines
  if (lastX1 !== null) {
    prev1.setAttribute('x1', lastX1); prev1.setAttribute('x2', lastX1);
    prev1.setAttribute('opacity', '0.85');
  }
  if (lastX2 !== null) {
    prev2.setAttribute('x1', lastX2); prev2.setAttribute('x2', lastX2);
    prev2.setAttribute('opacity', '0.85');
  }
  lastX1 = null; lastX2 = null;

  line1.setAttribute('opacity', '0');
  line2.setAttribute('opacity', '0');
  clearBarAnn('ann1'); clearBarAnn('ann2');

  const result = document.getElementById('yearResult');

  if (!in_top && !in_bot) {
    result.innerHTML = `<span style="color:#888">${val} ${currentEra} is outside the chart range.</span>`;
    result.style.display = 'block';
    return;
  }

  let topHtml = '';
  let botHtml = '';

  if (in_top) {
    line1.setAttribute('x1', Math.round(x_top));
    line1.setAttribute('x2', Math.round(x_top));
    line1.setAttribute('opacity', '0.85');
    lastX1 = Math.round(x_top);
    setBarAnn('ann1', x_top, fmtTop(yr_top));
    topHtml = buildOccurrence(x_top, `${val} ${currentEra} — Top Axis`, true, compBot(yr_top));
  }

  if (is_double) {
    line2.setAttribute('x1', Math.round(x_bot));
    line2.setAttribute('x2', Math.round(x_bot));
    line2.setAttribute('opacity', '0.85');
    lastX2 = Math.round(x_bot);
    setBarAnn('ann2', x_bot, fmtBot(yr_bot));
    botHtml = buildOccurrence(x_bot, `${val} ${currentEra} — Bottom Axis`, false, compTop(yr_bot));
  } else if (in_bot && !in_top) {
    line1.setAttribute('x1', Math.round(x_bot));
    line1.setAttribute('x2', Math.round(x_bot));
    line1.setAttribute('opacity', '0.85');
    lastX1 = Math.round(x_bot);
    setBarAnn('ann1', x_bot, fmtBot(yr_bot));
    botHtml = buildOccurrence(x_bot, `${val} ${currentEra} — Bottom Axis`, false, compTop(yr_bot));
  }

  let html = '';
  if (is_double && !isMobile()) {
    html = `<div class="yr-double"><div>${topHtml}</div><div class="yr-divider"></div><div>${botHtml}</div></div>`;
  } else {
    html = topHtml || botHtml;
    if (topHtml && botHtml) html = topHtml + `<div class="yr-divider"></div>` + botHtml;
  }

  if (isMobile()) {
    document.getElementById('overlayContent').innerHTML = html;
    document.getElementById('yearOverlay').classList.add('active');
    result.style.display = 'none';
  } else {
    result.innerHTML = html;
    result.style.display = 'block';
    result.style.width = is_double ? 'max-content' : '';
  }
}

</script>

<div id="yearOverlay">
  <button id="overlayBack" onclick="closeOverlay()">&#8592; Back to See Year</button>
  <div id="overlayContent"></div>
</div>
</body>
</html>
